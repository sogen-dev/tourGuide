<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>持ち物 | 広研ラスペア tour</title>
  <meta name="description" content="広研ラスペア旅行のしおりの持ち物ページ。準備物リストと持ち物メモを確認できます。">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="packing-page">
  <div class="page-shell subpage-shell">
    <nav class="topbar page-topbar">
      <a class="brand" href="../index.html">
        <span class="brand-script">tour</span>
        <span class="brand-main">広研ラスペア</span>
      </a>
      <div class="topbar-links">
        <a href="schedule.html">日程</a>
        <a href="rules.html">ルール</a>
        <a href="members.html">メンバー</a>
        <a class="is-active" href="packing.html">持ち物</a>
        <a href="appendix.html">付録</a>
      </div>
    </nav>

    <main>
      <header class="page-masthead">
        <p class="eyebrow">持ち物一覧</p>
        <h1>PACKING LIST</h1>
      </header>

      <section class="section compact-section">
        <div class="packing-grid">
          <article class="packing-card">
            <h3>必須</h3>
            <label><input type="checkbox" data-pack="phone">スマホ</label>
            <label><input type="checkbox" data-pack="wallet">財布（免許証など）</label>
            <label><input type="checkbox" data-pack="charger">充電器</label>
          </article>

          <article class="packing-card">
            <h3>衣類</h3>
            <label><input type="checkbox" data-pack="clothes">動きやすい服装</label>
            <label><input type="checkbox" data-pack="swimwear">水着</label>
            <label><input type="checkbox" data-pack="hat">帽子</label>
            <label><input type="checkbox" data-pack="sunglasses">サングラス</label>
            <label><input type="checkbox" data-pack="outer">軽い上着</label>
            <label><input type="checkbox" data-pack="underwear">下着・靴下</label>
            <label><input type="checkbox" data-pack="sandals">サンダル</label>
            <label><input type="checkbox" data-pack="shoes">動きやすい靴</label>
          </article>

          <article class="packing-card">
            <h3>健康・衛生</h3>
            <label><input type="checkbox" data-pack="sunblock">日焼け止め</label>
            <label><input type="checkbox" data-pack="spray">虫除けスプレー</label>
            <label><input type="checkbox" data-pack="medicine">常備薬</label>
            <label><input type="checkbox" data-pack="toothbrush">歯ブラシ・歯磨き粉</label>
            <label><input type="checkbox" data-pack="hanky">ハンカチ・ティッシュ</label>
            <label><input type="checkbox" data-pack="cosme">化粧品・スキンケア用品</label>
            <label><input type="checkbox" data-pack="towels">バスタオル・タオル</label>
          </article>

          <article class="packing-card">
            <h3>あると便利</h3>
            <label><input type="checkbox" data-pack="fan">ハンディファン</label>
            <label><input type="checkbox" data-pack="dryer">ドライヤー・ヘアアイロン</label>
            <label><input type="checkbox" data-pack="umbrella">折りたたみ傘・日傘</label>
            <label><input type="checkbox" data-pack="bag">ビニール袋</label>
            <label><input type="checkbox" data-pack="watergun">水鉄砲・ボール</label>
            <label><input type="checkbox" data-pack="watercase">防水ケース</label>
            <label><input type="checkbox" data-pack="other">個別で必要なもの</label>
          </article>
        </div>

        <aside class="memo-card">
          <h3>メモ</h3>
          <ul>
            <li>スーツケースは避けてください。</li>
            <li>着替えやタオルの枚数は、海や温泉の回数に合わせて各自で調整してください。</li>
            <li>エアビの備品として、シャンプー、コンディショナー、ボディーソープ、ドライヤー、ケトル、洗濯機、乾燥機などなど</li>
          </ul>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <a href="members.html">前へ: メンバー</a>
      <a href="appendix.html">次へ: 付録</a>
    </footer>

    <script src="../script.js"></script>
  </div>
</body>
</html>
